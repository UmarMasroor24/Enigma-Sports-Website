<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Enigma Sports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }
    .error-num {
      font-family: var(--font-display);
      font-size: clamp(120px, 20vw, 200px);
      letter-spacing: 0.04em;
      color: var(--border-mid);
      line-height: 1;
      margin-bottom: 24px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0.04em;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .error-body {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.75;
      max-width: 400px;
      margin: 0 auto 40px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-num">404</div>
      <div class="error-title">PAGE NOT FOUND</div>
      <p class="error-body">The page you're looking for doesn't exist. Head back to the homepage or get in touch with us directly.</p>
      <div class="error-actions">
        <a class="btn-red" href="/">← Back to Homepage</a>
        <a class="btn-outline" href="https://wa.me/923001234567">💬 WhatsApp Us</a>
      </div>
    </div>
  </div>
</body>
</html>
